<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>P4 Ph2 입상덕트 설치현황</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">P4 Ph2 입상덕트 설치현황 <span id="upd" class="upd"></span></div>
    <div id="zoneTabs" class="zone-tabs"></div>
    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="성상·SIZE·덕트NO 검색 (예: 1200A, ACID)" />
      <button id="searchClear" title="검색 지우기" class="hidden">✕</button>
    </div>
    <div class="spacer"></div>
    <button id="dashBtn" class="btn-dash" title="대시보드">📊 대시보드</button>
    <button id="histBtn" class="btn-dash" title="변경 이력 (누가·언제·무엇을)">📜 이력</button>
    <button id="diffBtn" class="btn-diff" title="전일 대비 변경 표시 (설치·간섭)">전일대비</button>
    <div class="zoom-ctrls">
      <button id="zoomOut" title="축소">－</button>
      <button id="zoomReset" title="원래대로">100%</button>
      <button id="zoomIn" title="확대">＋</button>
    </div>
    <button id="exportBtn" class="btn-export" title="엑셀로 내보내기">엑셀 ⬇</button>
    <button id="userBtn" class="btn-user" title="사용자 변경"><span id="userLabel">사용자</span></button>
    <span id="connState" class="conn local" title="저장 모드">로컬</span>
  </header>

  <!-- 범례 + 진행/갯수 통합 바 (감추기 가능) -->
  <div id="statusStrip" class="status-strip"></div>

  <main id="gridWrap">
    <div id="grid" class="grid"></div>
  </main>

  <!-- (라인+층) 통합 편집 -->
  <div id="editorModal" class="modal sheet hidden">
    <div class="modal-card editor">
      <div class="modal-head">
        <div><span id="edTitle">덕트 · 층</span><div id="edSub" class="ed-sub"></div></div>
        <button class="close" data-close aria-label="닫기">✕</button>
      </div>
      <div class="editor-body">
        <div class="ed-preview">
          <div class="pv-label">미리보기</div>
          <div class="pv-cells">
            <div class="pv-cell" data-pv="횡주"><i>횡주</i><b id="pvH"></b></div>
            <div class="pv-cell tall" data-pv="입상"><i>입상</i><b id="pvI"></b></div>
            <div class="pv-cell" data-pv="바닥"><i>바닥</i><b id="pvB"></b></div>
          </div>
        </div>
        <div id="edLayers" class="ed-layers"></div>
        <div class="ed-note">
          <i class="auto-ic">⏱</i> 금일설치·금일타공은 자동입니다. 완료로 바꾸면 오늘은 금일색, 다음날 완료색으로 바뀝니다.
        </div>
        <div class="ed-field">
          <label>잔여작업 메모</label>
          <textarea id="edMemo" rows="2" placeholder="예: 보 간섭 해소 후 입상 연결 예정"></textarea>
        </div>
        <div class="ed-field">
          <label>사진 (이 라인·층)</label>
          <div id="edPhotos" class="ed-photos"></div>
          <div id="photoDrop" class="photo-drop">
            <input id="photoInput" type="file" accept="image/*" capture="environment" multiple hidden />
            <button id="photoBtn" class="btn-photo">📷 촬영·업로드</button>
            <span class="drop-hint">또는 사진을 끌어다 놓거나 붙여넣기(Ctrl+V)</span>
          </div>
          <span id="photoHint" class="photo-hint"></span>
        </div>
      </div>
      <div class="modal-foot ed-foot">
        <span id="edMeta" class="ed-meta"></span>
        <button class="btn-primary" data-close>완료</button>
      </div>
    </div>
  </div>

  <!-- 텍스트 입력(메모/접점) -->
  <div id="textModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><span id="textTitle">메모</span><button class="close" data-close>✕</button></div>
      <div id="textStatus" class="text-status hidden">
        <span class="ts-label">상태</span>
        <span class="seg ts-seg">
          <button data-cstat="todo">미완료</button>
          <button data-cstat="done">완료</button>
        </span>
      </div>
      <textarea id="textArea" rows="5" placeholder="내용 입력"></textarea>
      <div class="modal-foot"><button id="textDelete" class="btn-ghost">삭제</button><button id="textSave" class="btn-primary">저장</button></div>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="dashModal" class="modal hidden">
    <div class="modal-card dash">
      <div class="modal-head"><span>📊 대시보드 <span id="dashScope" class="dash-scope"></span></span><button class="close" data-close>✕</button></div>
      <div id="dashBody" class="dash-body"></div>
    </div>
  </div>

  <!-- 변경 이력 -->
  <div id="histModal" class="modal hidden">
    <div class="modal-card dash">
      <div class="modal-head"><span>📜 변경 이력</span><button class="close" data-close>✕</button></div>
      <div id="histBody" class="dash-body"></div>
    </div>
  </div>

  <!-- 이름/팀 입력 -->
  <div id="nameModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><span>접속 정보</span></div>
      <div class="name-form">
        <label>이름 <input id="nameInput" type="text" placeholder="홍길동" /></label>
        <label>팀 <input id="teamInput" type="text" placeholder="○○팀" /></label>
      </div>
      <div class="modal-foot"><button id="nameSave" class="btn-primary">시작</button></div>
    </div>
  </div>

  <div id="infoTip" class="info-tip hidden"></div>

  <script src="config.js"></script>
  <script src="seed.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
